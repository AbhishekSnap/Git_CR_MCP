# Commit Analyser — Reusable Workflow
# =====================================
# This workflow is called by other repositories via `workflow_call`.
# It analyses each pushed commit using an MCP server + Claude AI and
# appends a structured entry to the repository's GitHub Wiki.
#
# Usage in a consumer repo:
#   jobs:
#     analyse:
#       uses: YOUR_ORG/commit-analyser-mcp/.github/workflows/main.yml@main
#       secrets:
#         ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

name: Commit Analyser (Reusable)

on:
  workflow_call:
    secrets:
      ANTHROPIC_API_KEY:
        required: true
        description: "Anthropic API key for Claude. Add to consumer repo secrets."

jobs:
  analyse-commit:
    name: Analyse commit with Claude
    runs-on: ubuntu-latest

    # Never let a failed analysis block the caller's workflow
    continue-on-error: true

    steps:
      # ── 1. Checkout the tool repo (Git_CR_MCP) to get .mcp/ scripts ──────────
      # The caller's commit data comes via env vars + GitHub API — we don't need
      # to check out the caller's repo. The github.* context already points to it.
      - name: Checkout analyser tool (Git_CR_MCP)
        uses: actions/checkout@v4
        with:
          repository: AbhishekSnap/Git_CR_MCP
          ref: main

      # ── 2. Python setup ───────────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # ── 3. Install dependencies ───────────────────────────────────────────────
      - name: Install dependencies
        run: pip install -r .mcp/requirements.txt

      # ── 4. Run analyser ───────────────────────────────────────────────────────
      - name: Run commit analyser
        env:
          # Claude API key (passed in via workflow_call secret)
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

          # Built-in GitHub Actions token — automatically available, no secret needed
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

          # Commit context — sourced from the GitHub Actions event payload
          COMMIT_SHA:       ${{ github.sha }}
          COMMIT_MESSAGE:   ${{ github.event.head_commit.message }}
          COMMIT_AUTHOR:    ${{ github.event.head_commit.author.name }}
          COMMIT_TIMESTAMP: ${{ github.event.head_commit.timestamp }}
          BRANCH_NAME:      ${{ github.ref_name }}
          REPO_NAME:        ${{ github.repository }}

        run: python .mcp/analyser.py
