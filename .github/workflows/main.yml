# Commit Analyser — Reusable Workflow
# =====================================
# This workflow is called by other repositories via `workflow_call`.
# It analyses each pushed commit using an MCP server + Claude AI and
# appends a structured entry to the repository's GitHub Wiki.
#
# Usage in a consumer repo:
#   jobs:
#     analyse:
#       uses: AbhishekSnap/Git_CR_MCP/.github/workflows/main.yml@main
#       permissions:
#         contents: write
#       secrets:
#         ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

name: Commit Analyser (Reusable)

on:
  workflow_call:
    secrets:
      ANTHROPIC_API_KEY:
        required: true
        description: "Anthropic API key for Claude. Add to consumer repo secrets."
    inputs:
      pr_number:
        required: false
        type: string
        default: ""
      pr_action:
        required: false
        type: string
        default: ""
      pr_title:
        required: false
        type: string
        default: ""
      pr_author:
        required: false
        type: string
        default: ""
      pr_base_branch:
        required: false
        type: string
        default: ""
      pr_head_branch:
        required: false
        type: string
        default: ""

jobs:
  analyse-commit:
    name: Analyse with Claude
    runs-on: ubuntu-latest

    # Never let a failed analysis block the caller's workflow
    continue-on-error: true

    steps:
      # ── 1. Checkout Git_CR_MCP to get the .mcp/ scripts ──────────────────────
      # The caller's commit data arrives via env vars + GitHub API calls.
      # The github.* context (sha, repository, token) still refers to the caller.
      - name: Checkout analyser tool (Git_CR_MCP)
        uses: actions/checkout@v4
        with:
          repository: AbhishekSnap/Git_CR_MCP
          ref: main

      # ── 2. Python setup ───────────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # ── 3. Install dependencies ───────────────────────────────────────────────
      - name: Install dependencies
        run: pip install -r .mcp/requirements.txt

      # ── 4. Run analyser ───────────────────────────────────────────────────────
      - name: Run commit analyser
        if: ${{ inputs.pr_number == '' }}
        env:
          # Claude API key (passed in via workflow_call secret)
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

          # Built-in GitHub Actions token — scoped to the caller's repo
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

          # Commit context — from the caller's event payload
          COMMIT_SHA:       ${{ github.sha }}
          COMMIT_MESSAGE:   ${{ github.event.head_commit.message }}
          COMMIT_AUTHOR:    ${{ github.event.head_commit.author.name }}
          COMMIT_TIMESTAMP: ${{ github.event.head_commit.timestamp }}
          BRANCH_NAME:      ${{ github.ref_name }}
          REPO_NAME:        ${{ github.repository }}

        run: python .mcp/analyser.py

      # ── 5. Run PR analyser ────────────────────────────────────────────────────
      - name: Run PR analyser
        if: ${{ inputs.pr_number != '' }}
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN:      ${{ secrets.GITHUB_TOKEN }}
          REPO_NAME:         ${{ github.repository }}
          PR_NUMBER:         ${{ inputs.pr_number }}
          PR_ACTION:         ${{ inputs.pr_action }}
          PR_TITLE:          ${{ inputs.pr_title }}
          PR_AUTHOR:         ${{ inputs.pr_author }}
          PR_BASE_BRANCH:    ${{ inputs.pr_base_branch }}
          PR_HEAD_BRANCH:    ${{ inputs.pr_head_branch }}
        run: python .mcp/pr-analyser.py
